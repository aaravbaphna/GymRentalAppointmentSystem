# Server
server.port=8080
spring.application.name=appointment-scheduler

# SQLite via JDBC (no ORM)
spring.datasource.url=jdbc:sqlite:./data/appointments.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# SQLite needs single connection for write serialization and busy timeout
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-init-sql=PRAGMA busy_timeout = 5000; PRAGMA journal_mode = WAL; PRAGMA foreign_keys = ON;

# Initialize schema and seed data on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=false

# Thymeleaf
spring.thymeleaf.cache=false

# Actuator: expose health, info, metrics
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.root=INFO
logging.level.com.sjsu.appointments=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Mock external service base URL (this app calls itself for the mock notification endpoint)
app.notification.base-url=http://localhost:8080
