<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<h1>Online Appointment Scheduling</h1>
<p>Browse available time slots, book an appointment with a provider, or manage your bookings.</p>

<div>
    <div class="stat"><strong th:text="${openSlotCount}">0</strong>open slots</div>
    <div class="stat"><strong th:text="${providerCount}">0</strong>providers</div>
</div>
<div style="margin-top:1em">
    <div class="stat"><strong th:text="${bookings}">0</strong>bookings</div>
</div>

<h2>Get started</h2>
<ul>
    <li><a th:href="@{/slots}">View available slots and book</a></li>
    <li><a th:href="@{/appointments}">View existing appointments</a></li>
    <li><a th:href="@{/providers}">Manage provider availability</a></li>
</ul>
</body>
</html>
