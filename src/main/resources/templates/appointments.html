<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Appointments')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<h1>Appointments</h1>

<form method="get" th:action="@{/appointments}" style="margin-bottom:1em">
    <label>Filter by customer:
        <select name="customerId" onchange="this.form.submit()">
            <option value="">— All —</option>
            <option th:each="c : ${customers}"
                    th:value="${c.id}"
                    th:text="${c.name}"
                    th:selected="${selectedCustomerId != null and selectedCustomerId == c.id}"></option>
        </select>
    </label>
</form>

<p th:if="${#lists.isEmpty(appointments)}"><em>No appointments yet.</em></p>

<table th:if="${not #lists.isEmpty(appointments)}">
    <thead>
    <tr><th>ID</th><th>Customer</th><th>Provider</th><th>Service</th><th>Start</th><th>Status</th><th>Action</th></tr>
    </thead>
    <tbody>
    <tr th:each="a : ${appointments}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.customerName}"></td>
        <td th:text="${a.providerName}"></td>
        <td th:text="${a.serviceName}"></td>
        <td th:text="${a.startTime}"></td>
        <td><span class="pill" th:classappend="${a.status}" th:text="${a.status}"></span></td>
        <td>
            <form th:if="${a.status == 'BOOKED'}" method="post"
                  th:action="@{|/appointments/${a.id}/cancel|}" style="display:inline">
                <input type="hidden" name="customerId" th:value="${selectedCustomerId}" />
                <button type="submit" class="cancel">Cancel</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
