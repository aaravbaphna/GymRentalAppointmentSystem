<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Book Appointment')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<div th:replace="~{fragments/layout :: alerts}"></div>

<h1>Book Appointment</h1>

<table>
    <tr><th>Provider</th><td th:text="${slot.providerName}"></td></tr>
    <tr><th>Service</th><td th:text="${slot.serviceName}"></td></tr>
    <tr><th>Start</th><td th:text="${slot.startTime}"></td></tr>
    <tr><th>End</th><td th:text="${slot.endTime}"></td></tr>
</table>

<form th:action="@{/book}" method="post">
    <input type="hidden" name="slotId" th:value="${slot.id}" />
    <p>
        <label>Customer:
            <select name="customerId" required>
                <option th:each="c : ${customers}" th:value="${c.id}" th:text="|${c.name} (${c.email})|"></option>
            </select>
        </label>
    </p>
    <p>
        <label>Notes (optional):<br/>
            <textarea name="notes" rows="3" cols="40" maxlength="500"></textarea>
        </label>
    </p>
    <p><button type="submit">Confirm Booking</button>
       <a th:href="@{/slots}" style="margin-left:1em">Cancel</a></p>
</form>
</body>
</html>
